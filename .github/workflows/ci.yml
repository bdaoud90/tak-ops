name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml ansible-core

      - name: Shell syntax checks
        run: bash -n scripts/*.sh

      - name: Python compile checks
        run: python -m compileall tooling tests

      - name: Config validation
        run: ./scripts/validate-config.sh

      - name: Pytest
        run: pytest -q

      - name: Terraform fmt/validate (optional)
        run: |
          if command -v terraform >/dev/null 2>&1; then
            terraform -chdir=infra/terraform fmt -check -recursive
            terraform -chdir=infra/terraform/environments/dev init -backend=false
            terraform -chdir=infra/terraform/environments/dev validate
            terraform -chdir=infra/terraform/environments/prod init -backend=false
            terraform -chdir=infra/terraform/environments/prod validate
          else
            echo "::warning::terraform not installed in runner; skipping terraform checks"
          fi

      - name: Ansible syntax-check
        run: |
          if command -v ansible-playbook >/dev/null 2>&1; then
            ansible-playbook -i infra/ansible/inventories/dev/hosts.yml --syntax-check infra/ansible/playbooks/site.yml
            ansible-playbook -i infra/ansible/inventories/dev/hosts.yml --syntax-check infra/ansible/playbooks/edge-node.yml
          else
            echo "::warning::ansible-playbook unavailable; skipping ansible syntax checks"
          fi
