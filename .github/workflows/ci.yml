name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install pytest PyYAML ansible

      - name: Shell lint (syntax)
        run: bash -n scripts/*.sh

      - name: Python compile check
        run: python -m compileall tooling tests

      - name: Config validation
        run: ./scripts/validate-config.sh

      - name: Terraform fmt check
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Terraform validate (dev)
        run: |
          terraform -chdir=infra/terraform/environments/dev init -backend=false
          terraform -chdir=infra/terraform/environments/dev validate

      - name: Terraform validate (prod)
        run: |
          terraform -chdir=infra/terraform/environments/prod init -backend=false
          terraform -chdir=infra/terraform/environments/prod validate

      - name: Ansible syntax check (site)
        run: |
          ANSIBLE_CONFIG=infra/ansible/ansible.cfg \
          ansible-playbook --syntax-check \
          -i infra/ansible/inventories/dev/hosts.yml \
          infra/ansible/playbooks/site.yml

      - name: Ansible syntax check (edge)
        run: |
          ANSIBLE_CONFIG=infra/ansible/ansible.cfg \
          ansible-playbook --syntax-check \
          -i infra/ansible/inventories/dev/hosts.yml \
          infra/ansible/playbooks/edge-node.yml

      - name: Pytest
        run: pytest -q
