---
- name: Create manual staging directory for restricted TAK artifacts
  ansible.builtin.file:
    path: "{{ tak_manual_staging_dir }}"
    state: directory
    mode: "0750"

- name: Create placeholder readme for manual TAK install
  ansible.builtin.copy:
    dest: "{{ tak_manual_staging_dir }}/README-MANUAL-STEP.txt"
    mode: "0640"
    content: |
      Manual operator step:
      - Place licensed/proprietary TAK components in this directory.
      - Follow vendor-approved installation process.
      - Re-run validation and smoke tests after install.
