---
- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0750"

- name: Install backup cron placeholder
  ansible.builtin.copy:
    dest: /etc/cron.daily/tak-backup
    mode: "0750"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      tar -czf {{ backup_dir }}/tak-$(date +%F).tar.gz {{ tak_install_root }}
